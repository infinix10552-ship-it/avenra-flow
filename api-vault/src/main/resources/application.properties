spring.application.name=Automated-Invoice-System
server.port=8081

spring.profiles.active=${SPRING_PROFILE:prod}

# REVERSE PROXY CONFIGURATION
server.forward-headers-strategy=framework

#ENVIRONMENT and ROUTING
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# SECURITY and DATABASE
spring.security.user.name=user
application.security.jwt.secret=${JWT_SECRET}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/invoice_db}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${DB_DDL:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# RABBITMQ MESSAGE BROKER
spring.rabbitmq.addresses=${CLOUDAMQP_URL:amqp://guest:guest@localhost:5672/}

#FILE UPLOAD CONFIGURATION
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB


#CLOUDFLARE R2 (S3 COMPATIBLE STORAGE)
cloud.aws.credentials.access-key=${R2_ACCESS_KEY}
cloud.aws.credentials.secret-key=${R2_SECRET_KEY}
cloud.aws.s3.bucket-name=${R2_BUCKET_NAME}
cloud.aws.s3.endpoint=${R2_ENDPOINT}
cloud.aws.s3.public-domain=${R2_PUBLIC_DOMAIN}
cloud.aws.region.static=auto

# EXTERNAL APIS (OAUTH, SMTP)

spring.security.oauth2.client.registration.google.client-id=${OAUTH2_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${OAUTH2_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=${OAUTH2_SCOPE:profile, email}

brevo.api.key=${BREVO_API_KEY:none}
brevo.sender.email=${BREVO_SENDER_EMAIL:infinix10552@gmail.com}
brevo.sender.name=${BREVO_SENDER_NAME:Avenra FLOW}